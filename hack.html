<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚠️ ROOT BREACH ⚠️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .terminal {
            width: 96%;
            max-width: 550px;
            height: 90%;
            background: #010101;
            border: 1px solid #0f0;
            border-radius: 6px;
            padding: 12px;
            box-shadow: 0 0 12px rgba(0,255,0,0.15);
            overflow-y: auto;
        }
        .terminal::-webkit-scrollbar {
            width: 4px;
        }
        .terminal::-webkit-scrollbar-track {
            background: #111;
        }
        .terminal::-webkit-scrollbar-thumb {
            background: #0f0;
        }
        .line {
            color: #0f0;
            font-size: 12px;
            margin-bottom: 4px;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: monospace;
        }
        .input-line {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            align-items: center;
        }
        .input-line span {
            color: #0f0;
        }
        input {
            background: #000;
            border: none;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            outline: none;
            flex: 1;
        }
        button {
            background: #0a0;
            color: #000;
            border: none;
            padding: 3px 12px;
            font-family: monospace;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="terminal" id="terminal">
    <div id="content"></div>
</div>

<script>
    const terminal = document.getElementById('terminal');
    const contentDiv = document.getElementById('content');

    function addLine(text, color = '#0f0') {
        const div = document.createElement('div');
        div.className = 'line';
        div.style.color = color;
        div.innerHTML = text;
        contentDiv.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight;
        return div;
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function matrixFlood() {
        for(let i = 0; i < 22; i++) {
            let line = "";
            for(let j = 0; j < 48; j++) {
                const r = Math.random();
                if(r < 0.33) line += '0';
                else if(r < 0.66) line += '1';
                else line += String.fromCharCode(0x30A0 + Math.random() * 40);
            }
            addLine(line, '#0a3');
            await sleep(30);
        }
    }

    async function typeLine(text, color = '#0f0', delay = 28) {
        const div = document.createElement('div');
        div.className = 'line';
        div.style.color = color;
        contentDiv.appendChild(div);
        for(let i = 0; i < text.length; i++) {
            div.innerHTML += text[i];
            terminal.scrollTop = terminal.scrollHeight;
            await sleep(delay);
        }
        return div;
    }

    async function loadingBar(text, duration = 1400) {
        const div = addLine('', '#0f0');
        const start = Date.now();
        const interval = setInterval(() => {
            const elapsed = Date.now() - start;
            let percent = Math.min(100, Math.floor((elapsed / duration) * 100));
            const bar = '█'.repeat(Math.floor(percent/2)) + '░'.repeat(50 - Math.floor(percent/2));
            div.innerHTML = `${text} ${percent}% [${bar}]`;
            if(percent >= 100) clearInterval(interval);
        }, 30);
        await sleep(duration);
        return div;
    }

    async function binaryExplosion() {
        for(let i = 0; i < 10; i++) {
            let binLine = "";
            for(let j = 0; j < 52; j++) {
                binLine += Math.random() > 0.5 ? '1' : '0';
            }
            addLine(binLine, '#242');
            await sleep(35);
        }
    }

    async function mainExploit() {
        addLine('');
        await typeLine('[!] دسترسی غیرمجاز سطح ریشه', '#f44');
        await typeLine('[!] رهگیری بسته‌های داده...', '#f44');
        await sleep(600);
        
        addLine('');
        await typeLine('[+] بارگذاری ماژول‌های هسته', '#0f0');
        await matrixFlood();
        
        addLine('');
        await typeLine('[+] دور زدن لایه امنیتی هدف', '#0f0');
        await loadingBar('[>] شکستن رمزنگاری', 1500);
        
        await binaryExplosion();
        
        addLine('');
        await typeLine('[+] دامنه هدف: [REDACTED]', '#5f5');
        await sleep(250);
        await typeLine('[+] معماری سیستم: ARM64_UNKNOWN', '#5f5');
        await sleep(250);
        await typeLine('[+] فایروال عاطفی: غیرفعال', '#5f5');
        await sleep(400);
        
        addLine('');
        await typeLine('[>] تزریق دستور به بافر', '#fa0');
        await loadingBar('[>] اجرای شل‌کد', 1300);
        
        addLine('');
        await typeLine('▂▃▄▅▆▇█▓▒░  EXTRACTING  ░▒▓█▇▆▅▄▃▂', '#fa0');
        await sleep(400);
        
        const extractDiv = addLine('', '#f0f');
        for(let i = 0; i < 3; i++) {
            extractDiv.innerHTML = '[>>] ' + '■'.repeat(18) + ' [<<]';
            await sleep(150);
            extractDiv.innerHTML = '[>>] ' + '□'.repeat(18) + ' [<<]';
            await sleep(150);
        }
        
        addLine('');
        await typeLine('>> PAYLOAD_CORE:', '#fa0');
        await sleep(300);
        await typeLine('    ▶ شناسه: 0x4D4A5454', '#afa');
        await typeLine('    ▶ امضا: MOJTABA', '#afa');
        await typeLine('    ▶ وضعیت: ACTIVE', '#afa');
        await sleep(400);
        
        addLine('');
        await typeLine('━━━━━━━━━━━━━━━━━━━━━━━━━', '#f0f');
        await typeLine('>> system.heart.execute()', '#fa0');
        await sleep(200);
        await typeLine('    → تابع: ابراز_علاقه', '#8f8');
        await typeLine('    → پارامتر: مجتبی', '#8f8');
        await typeLine('    → خروجی: ازت خوشم میاد', '#8f8');
        await typeLine('━━━━━━━━━━━━━━━━━━━━━━━━━', '#f0f');
        
        await sleep(600);
        
        addLine('');
        await typeLine('[?] درخواست اتصال از: MOJTABA', '#0f0');
        await typeLine('[?] پروتکل: قرار_دوستانه', '#0f0');
        await typeLine('[?] موافقی؟ (y/n):', '#fa0');
        
        const inputDiv = document.createElement('div');
        inputDiv.className = 'input-line';
        inputDiv.innerHTML = `<span>mojtaba@exploit:~$</span> <input type="text" id="hackInput" maxlength="1" autocomplete="off"> <button id="hackBtn">RUN</button>`;
        contentDiv.appendChild(inputDiv);
        
        const input = document.getElementById('hackInput');
        const btn = document.getElementById('hackBtn');
        input.focus();
        
        function submit() {
            const ans = input.value.trim().toLowerCase();
            if(ans === 'y') {
                addLine('');
                typeLine('[✔] اتصال پذیرفته شد', '#0f0');
                typeLine('[✔] کانال امن برقرار شد', '#0f0');
                sleep(300).then(() => {
                    typeLine('━━━━━━━━━━━━━━━━━━', '#8f8');
                    typeLine('>>> قرارداد امضا شد <<<', '#ff0');
                    typeLine('    → قهوه', '#8f8');
                    typeLine('    → سینما', '#8f8');
                    typeLine('    → هرچی تو دوست داری', '#8f8');
                    typeLine('━━━━━━━━━━━━━━━━━━', '#8f8');
                });
                inputDiv.remove();
            } else if(ans === 'n') {
                addLine('');
                typeLine('[✘] اتصال رد شد', '#f44');
                typeLine('[✘] در حال پاک کردن ردپا...', '#f44');
                sleep(800).then(() => {
                    addLine('');
                    typeLine('[!] این فقط یه تست نفوذ بود', '#777');
                    typeLine('[!] هیچ فشاری نیست', '#777');
                    typeLine('[+] اسکریپت MOJTABA بسته شد', '#777');
                });
                inputDiv.remove();
            } else {
                addLine('[!] ورودی نامعتبر. y یا n', '#fa0');
                input.value = '';
                input.focus();
            }
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        btn.onclick = submit;
        input.onkeypress = (e) => { if(e.key === 'Enter') submit(); };
    }
    
    mainExploit();
</script>
</body>
</html>
